spring.application.name=productocatalogo

server.port=8000

# Load local overrides from optional env files if they exist
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/producto-catalogo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
security.jwt.secret=${JWT_SECRET:}

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.producto=INFO
